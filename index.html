<!DOCTYPE html>
<html lang="es-AR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WizarCon - Copa de las Casas</title>

    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/x-icon" href="Favicon/favicon.ico">
    <link rel="icon" type="image/png" sizes="192x192" href="Favicon/android-icon-192x192.png">
    <link rel="apple-touch-icon" sizes="192x192" href="Favicon/apple-icon.png">
    <meta name="theme-color" content="#0e1a40">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div id="loading-overlay" role="status" aria-live="polite">🔮 Conectando con el Ministerio...</div>
    <p id="status-banner" class="status-banner is-hidden" role="status" aria-live="polite"></p>

    <h1>🏆 Copa de las Casas</h1>

    <div class="card">
        <h3>⚡ Cargar Puntos</h3>
        <p style="font-size: 0.8rem; color: #aaa; text-align: center; margin-top: -10px;">(Para restar, escribí un
            número negativo como -10)</p>
        <label>Actividad:</label>
        <select id="select-actividad"></select>
        <label>Cantidad:</label>
        <input type="number" id="puntos-input" value="10">
        <div class="house-grid">
            <button class="house-btn btn-gry" onclick="registrarPuntos('Gryffindor')">🦁 GRY</button>
            <button class="house-btn btn-huf" onclick="registrarPuntos('Hufflepuff')">🦡 HUF</button>
            <button class="house-btn btn-rav" onclick="registrarPuntos('Ravenclaw')">🦅 RAV</button>
            <button class="house-btn btn-sly" onclick="registrarPuntos('Slytherin')">🐍 SLY</button>
        </div>
    </div>

    <div class="card">
        <h3>📊 Posiciones en Vivo</h3>
        <table id="tabla-posiciones"></table>
    </div>

    <div class="card">
        <h3>📜 Historial de Movimientos</h3>
        <div class="historial-container" id="lista-historial">
        </div>
    </div>

    <div class="card" style="border-style: dashed; border-color: #555;">
        <h3>⚙️ Ajustes del Evento</h3>
        <h4>1. Puntos Iniciales</h4>
        <div class="house-grid" style="grid-template-columns: repeat(4, 1fr); font-size: 0.7rem;">
            <div>Gry<input type="number" id="base-Gryffindor" onchange="actualizarBases()"></div>
            <div>Huf<input type="number" id="base-Hufflepuff" onchange="actualizarBases()"></div>
            <div>Rav<input type="number" id="base-Ravenclaw" onchange="actualizarBases()"></div>
            <div>Sly<input type="number" id="base-Slytherin" onchange="actualizarBases()"></div>
        </div>
        <hr style="border:0; border-top:1px solid #333; margin:20px 0;">
        <h4>2. Actividades</h4>
        <div style="display:flex; gap:5px;">
            <input type="text" id="nueva-act-nombre" placeholder="Nombre">
            <button onclick="crearActividad()"
                style="background:#4CAF50; color:white; border:none; border-radius:8px; padding:0 15px;">+</button>
        </div>
        <div id="lista-actividades" style="margin-top:15px;"></div>
        <button onclick="resetearTodo()"
            style="width:100%; background:none; border:1px solid #ff4444; color:#ff4444; margin-top:20px; padding:10px; border-radius:8px;">🗑️
            Reiniciar Copa Completa</button>
    </div>

    <script type="module" src="script.js"></script>
</body>

</html>
